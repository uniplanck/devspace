name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    env:
      DEVSPACE_ALLOWED_ROOTS: ${{ github.workspace }}
      DEVSPACE_OAUTH_OWNER_TOKEN: ci-owner-token-that-is-long-enough
      DEVSPACE_PUBLIC_BASE_URL: http://127.0.0.1:7676

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate shell scripts
        if: runner.os != 'Windows'
        shell: bash
        run: bash -n scripts/quickstart-tailscale.sh scripts/devspace-control.sh

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Typecheck DevSpace Tool
        if: runner.os == 'macOS'
        run: |
          swiftc -parse-as-library -typecheck -framework SwiftUI -framework AppKit \
            extensions/devspace-tool/UsageCore.swift \
            extensions/devspace-tool/DevSpaceToolView.swift \
            extensions/devspace-tool/DevSpaceTool.swift

      - name: Doctor
        run: node dist/cli.js doctor
