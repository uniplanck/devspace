name: Propose GAG updates to GAE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: propose-gag-to-gae
  cancel-in-progress: true

jobs:
  propose:
    if: github.repository == 'uniplanck/gpt-agent'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inspect GAE release branch
        id: diff
        run: |
          git fetch origin gae
          count="$(git rev-list --count origin/gae..HEAD)"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "GAG commits pending for GAE: $count"

      - name: Find existing promotion pull request
        if: steps.diff.outputs.count != '0'
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          number="$(gh pr list --base gae --head main --state open --json number --jq '.[0].number // empty')"
          echo "number=$number" >> "$GITHUB_OUTPUT"

      - name: Create promotion pull request
        if: steps.diff.outputs.count != '0' && steps.existing.outputs.number == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base gae \
            --head main \
            --title "sync: promote GAG main to GAE" \
            --body $'GAG `main` has changes not yet reviewed for the GAE release channel.\n\nThis pull request does **not** update EC2, restart services, or merge automatically. Review GAE-specific runtime behavior and CI before merging.'

      - name: Report existing promotion pull request
        if: steps.diff.outputs.count != '0' && steps.existing.outputs.number != ''
        run: echo "Promotion pull request #${{ steps.existing.outputs.number }} is already open and now includes the latest main commits."
